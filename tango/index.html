<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>単語 Tango — Học từ vựng JLPT có thưởng</title>
<meta name="theme-color" content="#16140f">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%2316140f'/%3E%3Ctext x='32' y='44' font-size='34' text-anchor='middle' fill='%23d8a43a' font-family='serif'%3E単%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@600&display=swap" rel="stylesheet">
<style>
:root{--bg:#16140f;--card:#211d15;--card2:#2a2519;--line:#36301f;--cream:#ece3cf;--muted:#a99e84;
  --gold:#d8a43a;--green:#8fbf6f;--red:#e06a5e;--radius:14px}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scrollbar-width:thin;scrollbar-color:rgba(216,164,58,.4) transparent}
body{background:var(--bg);color:var(--cream);min-height:100vh;
  font-family:'Segoe UI',system-ui,-apple-system,Roboto,sans-serif;line-height:1.55}
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(216,164,58,.35);border-radius:99px;border:3px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-thumb:hover{background:rgba(216,164,58,.6);background-clip:padding-box}
.jp{font-family:'Noto Serif JP','Yu Mincho','Hiragino Mincho ProN',serif}
a{color:var(--gold)}
header{position:sticky;top:0;z-index:5;background:rgba(22,20,15,.94);backdrop-filter:blur(4px);
  border-bottom:1px solid var(--line)}
.hwrap{max-width:640px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;gap:10px}
.brand{font-weight:700;color:var(--gold);text-decoration:none;font-size:1.05rem;white-space:nowrap;margin-right:auto}
.menuBtn{display:none;background:var(--card2);border:1px solid var(--line);color:var(--cream);
  border-radius:8px;padding:6px 11px;font-size:1.05rem;line-height:1;width:auto}
nav{max-width:640px;margin:0 auto;display:flex;flex-wrap:wrap;gap:6px;padding:0 16px 10px}
nav a{color:var(--muted);text-decoration:none;font-size:.86rem;padding:6px 11px;border-radius:999px;white-space:nowrap}
nav a:hover{color:var(--cream)}
nav a.on{color:var(--bg);background:var(--gold);font-weight:600}
@media(max-width:640px){
  .menuBtn{display:inline-flex;align-items:center}
  nav{position:absolute;top:100%;left:0;right:0;max-width:none;margin:0;flex-direction:column;flex-wrap:nowrap;
    gap:6px;padding:10px 12px;background:var(--card);border-bottom:1px solid var(--line);
    display:none;z-index:6;box-shadow:0 10px 24px rgba(0,0,0,.45)}
  nav.open{display:flex}
  nav a{font-size:.95rem;padding:11px 12px;border-radius:8px}
}
.uchip{font-size:.78rem;color:var(--muted);cursor:pointer;white-space:nowrap;max-width:110px;overflow:hidden;text-overflow:ellipsis}
main{max-width:640px;margin:0 auto;padding:22px 16px 60px}
h1{font-size:1.5rem;margin-bottom:4px}
h2{font-size:1.1rem;margin:18px 0 8px}
.sub{color:var(--muted);font-size:.92rem;margin-bottom:18px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:14px}
.card.click{cursor:pointer;transition:border-color .15s}
.card.click:hover{border-color:var(--gold)}
.row{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap}
.big{font-size:1.6rem;font-weight:700;color:var(--gold)}
.tag{display:inline-block;font-size:.72rem;color:var(--bg);background:var(--gold);border-radius:999px;padding:2px 9px;font-weight:600}
.tag.dim{background:var(--line);color:var(--muted)}
button{font:inherit;cursor:pointer;border:none;border-radius:10px;padding:11px 18px;font-weight:600}
.btn{background:var(--gold);color:var(--bg);width:100%}
.btn:disabled{opacity:.45;cursor:default}
.btn2{background:var(--card2);color:var(--cream);border:1px solid var(--line);width:100%}
.mini{width:auto;padding:7px 14px;font-size:.85rem}
input,select{font:inherit;background:var(--card2);color:var(--cream);border:1px solid var(--line);
  border-radius:8px;padding:9px 12px;width:100%}
label{font-size:.8rem;color:var(--muted);display:block;margin:10px 0 4px}
.word{font-size:clamp(2.5rem,13vw,4rem);text-align:center;margin:6px 0 2px;line-height:1.2}
.word ruby rt{font-size:.32em;color:var(--muted);font-weight:400}
.ask{color:var(--muted);text-align:center;font-size:.9rem;margin-bottom:16px}
.opts{display:grid;gap:10px}
.opt{background:var(--card2);border:1px solid var(--line);color:var(--cream);text-align:left;
  padding:13px 15px;border-radius:10px;font-weight:500;font-size:.98rem}
.opt:not(:disabled):hover{border-color:var(--gold)}
.opt.right{border-color:var(--green);background:rgba(143,191,111,.12)}
.opt.wrong{border-color:var(--red);background:rgba(224,106,94,.12)}
.timer{height:5px;background:var(--line);border-radius:99px;overflow:hidden;margin-bottom:16px}
.timer i{display:block;height:100%;background:var(--gold);border-radius:99px}
.pack{border-top:1px dashed var(--line);margin-top:16px;padding-top:14px;font-size:.95rem}
.pack .ex{font-size:1.15rem;line-height:2.1;margin:8px 0}
.pack .ex ruby rt{font-size:.5em;color:var(--muted)}
.pack .ex .targ{color:var(--gold);border-bottom:2px solid var(--gold)}
.pack .vi{color:var(--muted);font-style:italic}
.pack .jpdef{color:var(--muted);font-size:.85rem;margin-top:6px}
.meter{height:10px;background:var(--line);border-radius:99px;overflow:hidden;margin:8px 0}
.meter i{display:block;height:100%;background:var(--gold)}
.ledger{font-size:.85rem;width:100%;border-collapse:collapse}
.ledger td{padding:6px 4px;border-bottom:1px solid var(--line);vertical-align:top}
.ledger .amt{text-align:right;font-weight:600;white-space:nowrap}
.pos{color:var(--green)}.neg{color:var(--red)}
.spk{background:none;border:1px solid var(--line);border-radius:8px;padding:2px 8px;
  font-size:.85rem;cursor:pointer;vertical-align:middle}
.spk:hover{border-color:var(--gold)}
.note{font-size:.82rem;color:var(--muted)}
.err{color:var(--red);font-size:.9rem;margin-top:10px;white-space:pre-wrap}
.ok{color:var(--green);font-size:.9rem;margin-top:10px}
.center{text-align:center}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stat{background:var(--card2);border-radius:10px;padding:10px 12px}
.stat b{font-size:1.3rem;color:var(--gold)}
.stat span{display:block;font-size:.75rem;color:var(--muted)}
.review{font-size:.9rem}
.review .it{padding:8px 0;border-bottom:1px solid var(--line)}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.chip{background:var(--card2);border:1px solid var(--line);color:var(--cream);
  border-radius:999px;padding:8px 16px;font-weight:700;font-size:.9rem}
.chip.on{background:var(--gold);color:var(--bg);border-color:var(--gold)}
.chip:disabled{opacity:.35;cursor:default}
.golden{border-color:var(--gold)!important;animation:glow 1.1s ease-in-out infinite alternate}
@keyframes glow{from{box-shadow:0 0 6px rgba(216,164,58,.25)}to{box-shadow:0 0 22px rgba(216,164,58,.6)}}
.gband{text-align:center;color:var(--gold);font-weight:700;font-size:.82rem;
  letter-spacing:.08em;margin-bottom:6px}
.flame{font-weight:700;color:var(--gold)}
.paytbl{width:100%;font-size:.83rem;border-collapse:collapse;margin-top:8px}
.paytbl td{padding:3px 4px;border-bottom:1px dashed var(--line)}
.paytbl td:last-child{text-align:right;font-weight:600}
.dbl{background:linear-gradient(160deg,#2c1c0e,#211d15);border:1px solid var(--gold)}
.btnRed{background:var(--red);color:#fff;width:100%;border-radius:10px}
.pop{animation:pop .25s ease}
@keyframes pop{0%{transform:scale(.72);opacity:0}100%{transform:scale(1);opacity:1}}
.cnt{font-variant-numeric:tabular-nums}
.gstep{display:flex;gap:12px;padding:9px 0;border-bottom:1px dashed var(--line);align-items:flex-start}
.gstep:last-child{border-bottom:none}
.gdot{flex:0 0 26px;height:26px;border-radius:50%;background:var(--card2);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;color:var(--muted)}
.gdone .gdot{background:rgba(143,191,111,.15);border-color:var(--green);color:var(--green)}
.gcur .gdot{background:var(--gold);border-color:var(--gold);color:var(--bg)}
.gcur>div>b{color:var(--gold)}
.chatbox{max-height:52vh;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:4px 8px 8px 2px;
  scrollbar-width:thin;scrollbar-color:rgba(216,164,58,.45) transparent}
.chatbox::-webkit-scrollbar{width:8px}
.chatbox::-webkit-scrollbar-track{background:transparent;margin:4px 0}
.chatbox::-webkit-scrollbar-thumb{background:rgba(216,164,58,.45);border-radius:99px}
.chatbox::-webkit-scrollbar-thumb:hover{background:var(--gold)}
.bubble{max-width:75%;padding:8px 13px;border-radius:16px;font-size:.95rem;line-height:1.4}
.bubble.me{align-self:flex-end;background:var(--gold);color:var(--bg);border-bottom-right-radius:5px}
.bubble.them{align-self:flex-start;background:var(--card2);border:1px solid var(--line);border-bottom-left-radius:5px}
.bubble .btext{white-space:pre-wrap;overflow-wrap:break-word}
.bubble .bmeta{font-size:.66rem;opacity:.65;margin-top:2px}
.chatform{display:flex;gap:8px;margin-top:10px}
.chatform input{flex:1}
.chatform .mini{width:auto;white-space:nowrap}
.chatprompt{color:var(--gold);font-weight:600;text-align:center;padding:14px 0;font-size:1.02rem}
.urow{display:flex;gap:10px;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line);flex-wrap:wrap}
.urow:last-child{border-bottom:none}
.uinfo{display:flex;gap:10px;align-items:center;min-width:0;flex:1}
.uav{width:38px;height:38px;border-radius:50%;object-fit:cover;flex:0 0 38px}
.uav0{display:flex;align-items:center;justify-content:center;background:var(--card2);border:1px solid var(--line);color:var(--gold);font-weight:700;text-transform:uppercase}
.uacts{display:flex;gap:6px;flex-wrap:wrap}
.ndot{display:inline-block;min-width:16px;height:16px;line-height:16px;text-align:center;background:var(--red);color:#fff;border-radius:999px;font-size:.66rem;padding:0 4px;vertical-align:middle}
/* Hộp thư admin 2 khung (kiểu Messenger) */
.adminchat{display:flex;height:68vh;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--card)}
.threadlist{width:42%;max-width:300px;min-width:190px;border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0}
.threadview{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0}
.tl-search{padding:8px;border-bottom:1px solid var(--line)}
.tl-search input{padding:8px 10px}
.tl-items{overflow-y:auto;flex:1;min-height:0;scrollbar-width:thin;scrollbar-color:rgba(216,164,58,.45) transparent}
.tl-items::-webkit-scrollbar{width:8px}
.tl-items::-webkit-scrollbar-thumb{background:rgba(216,164,58,.45);border-radius:99px}
.tl-item{display:flex;gap:9px;align-items:center;padding:9px 10px;border-bottom:1px solid var(--line);cursor:pointer}
.tl-item:hover{background:var(--card2)}
.tl-item.active{background:var(--card2);box-shadow:inset 3px 0 0 var(--gold)}
.tl-av{width:38px;height:38px;border-radius:50%;object-fit:cover;flex:0 0 38px}
.tl-av0{display:flex;align-items:center;justify-content:center;background:var(--bg);border:1px solid var(--line);color:var(--gold);font-weight:700;text-transform:uppercase}
.tl-main{min-width:0;flex:1}
.tl-top{display:flex;justify-content:space-between;gap:6px;align-items:baseline}
.tl-top b{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.tl-unreadname{font-weight:700!important;color:var(--cream)}
.tl-time{font-size:.66rem;color:var(--muted);white-space:nowrap;flex:0 0 auto}
.tl-prev{font-size:.8rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-badge{flex:0 0 auto;min-width:18px;height:18px;line-height:18px;text-align:center;background:var(--gold);color:var(--bg);border-radius:999px;font-size:.7rem;font-weight:700;padding:0 5px}
.tv-head{display:flex;gap:9px;align-items:center;padding:10px 12px;border-bottom:1px solid var(--line)}
.tv-body{flex:1;max-height:none!important}
.threadview .chatform{margin:0;padding:10px 12px;border-top:1px solid var(--line)}
.tv-empty{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;color:var(--muted)}
.tv-back{display:none;width:auto;padding:6px 10px}
@media(max-width:640px){
  .adminchat{height:74vh}
  .threadlist{width:100%;max-width:none}
  .adminchat.viewing .threadlist{display:none}
  .adminchat:not(.viewing) .threadview{display:none}
  .adminchat.viewing .tv-back{display:inline-flex}
}
footer{text-align:center;color:#7c745f;font-size:.75rem;padding:20px}
</style>

    <a class="brand" href="#home">単語<span style="color:var(--cream)"> Tango</span></a>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult,
         onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, serverTimestamp, collection, query,
         where, orderBy, limit, getDocs, addDoc, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-functions.js";

/* ── Firebase (dùng chung project với N1 quiz) ─────────────────────── */
const firebaseConfig = {
  apiKey: "AIzaSyBlZPJKb6KDJvMCPp1aCyUS0PcIG_dg_hc",
  authDomain: "n1-quiz.firebaseapp.com",
  projectId: "n1-quiz",
  storageBucket: "n1-quiz.firebasestorage.app",
  messagingSenderId: "419168624563",
  appId: "1:419168624563:web:52c6bc33f15af9e0dcf5c6"
};
const ADMIN_EMAIL = "ks235278@kaichi.ac.jp";
const app  = initializeApp(firebaseConfig);
const auth = getAuth(app); auth.useDeviceLanguage();
const db   = getFirestore(app);
const fns  = getFunctions(app, "asia-northeast1");
const call = (name, data) => httpsCallable(fns, name)(data).then(r => r.data);

/* ── State ──────────────────────────────────────────────────────────── */
const S = { bank: [], byId: {}, user: null, cfg: null, testing: false, chatUnsub: null };
const PKEY = "tango.progress.v1";
let prog = {};
try { prog = JSON.parse(localStorage.getItem(PKEY) || "{}"); } catch (e) { prog = {}; }
const saveProg = () => localStorage.setItem(PKEY, JSON.stringify(prog));
// hộp SRS: due sau khi trả lời đúng ở hộp i
const INTERVALS = [0, 10*60e3, 24*3600e3, 3*24*3600e3, 7*24*3600e3, 14*24*3600e3];
const CFG_DEFAULT = { cycleDays:30, cycleFee:1000, rewardCapRatio:0.2, targetItems:100,
                      testSize:20, eligibilityMinutes:3*24*60, perQuestionSec:8,
                      maxStake:500, dailyWinCap:3000, dblWindowSec:45 };

const $ = sel => document.querySelector(sel);
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const shuffle = a => { for (let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; };
// wf = furigana theo từng cụm kanji, tính sẵn trong bank (tools/extract_bank.py)
const rubyWord = it => it.wf ? `<span class="jp">${it.wf}</span>`
  : it.w === it.r ? `<span class="jp">${esc(it.w)}</span>`
  : `<ruby class="jp">${esc(it.w)}<rt>${esc(it.r)}</rt></ruby>`;

/* ── Phát âm: MP3 neural tạo sẵn, hỏng thì rơi về giọng máy ─────────── */
let voiceBox = null;
function playOr(src, fallback) {
  try {
    if (!voiceBox) voiceBox = new Audio();
    voiceBox.src = src;
    voiceBox.play().catch(fallback);
  } catch (e) { fallback(); }
}
function speak(it) {
  if (it) playOr(`audio/${it.id}.mp3`, () => speakTTS(it.r || it.w));
}
// Câu ví dụ: MP3 {id}_ex.mp3; fallback đọc theo ĐÚNG furigana —
// thay từng cụm kanji bằng phần rt (kana), khỏi để giọng máy đoán sai cách đọc.
function exPlain(it) {
  const d = document.createElement("div");
  d.innerHTML = it.ex || "";
  d.querySelectorAll("ruby").forEach(r => {
    const rt = r.querySelector("rt");
    r.replaceWith(rt ? rt.textContent : r.textContent);
  });
  return d.textContent.replace(/〜/g, "").trim();
}
function speakEx(it) {
  if (it && it.ex) playOr(`audio/${it.id}_ex.mp3`, () => speakTTS(exPlain(it)));
}
function speakTTS(text) {
  try {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "ja-JP"; u.rate = 0.9;
    speechSynthesis.cancel(); speechSynthesis.speak(u);
  } catch (e) {}
}
document.addEventListener("click", e => {
  const el = e.target.closest?.("[data-spk],[data-spkex]");
  if (!el) return;
  if (el.dataset.spk && S.byId[el.dataset.spk]) speak(S.byId[el.dataset.spk]);
  else if (el.dataset.spkex && S.byId[el.dataset.spkex]) speakEx(S.byId[el.dataset.spkex]);
});
const fmtDate = ts => { const d = ts?.toDate ? ts.toDate() : new Date(ts); return d.toLocaleDateString("vi-VN"); };
const fmtTime = ts => { const d = ts?.toDate ? ts.toDate() : (ts ? new Date(ts) : null);
  return d ? d.toLocaleString("vi-VN", { hour:"2-digit", minute:"2-digit", day:"2-digit", month:"2-digit" }) : ""; };
const tsMs = ts => ts?.toMillis ? ts.toMillis() : (ts?.seconds ? ts.seconds * 1000 : 0);
const sleep = ms => new Promise(r => setTimeout(r, ms));
const jstToday = () => new Date(Date.now() + 9*3600e3).toISOString().slice(0, 10);

/* ── Âm thanh sòng bài: synth WebAudio tí hon, không cần file ───────── */
let AC = null;
function snd(seq) {
  try {
    AC = AC || new (window.AudioContext || window.webkitAudioContext)();
    if (AC.state === "suspended") AC.resume();
    const t0 = AC.currentTime;
    for (const [f, st, d, type] of seq) {
      const o = AC.createOscillator(), g = AC.createGain();
      o.type = type || "triangle"; o.frequency.value = f;
      g.gain.setValueAtTime(0.001, t0 + st);
      g.gain.exponentialRampToValueAtTime(0.1, t0 + st + 0.012);
      g.gain.exponentialRampToValueAtTime(0.001, t0 + st + d);
      o.connect(g).connect(AC.destination);
      o.start(t0 + st); o.stop(t0 + st + d + 0.05);
    }
  } catch (e) {}
}
const sGood = () => snd([[1240, 0, .07]]);
const sBad  = () => snd([[170, 0, .13, "sawtooth"]]);
const sCoin = () => snd([[1568, 0, .05], [2093, .05, .08]]);
const sWin  = () => snd([[880, 0, .1], [1109, .09, .1], [1319, .18, .16], [1760, .3, .3]]);
const sLose = () => snd([[311, 0, .16, "sawtooth"], [233, .15, .18, "sawtooth"], [155, .32, .32, "sawtooth"]]);
const errMsg = e => (e?.message || String(e)).replace(/^Firebase: */, "").replace(/ \(functions\/[a-z-]+\)\.?$/, "")
  || "Có lỗi xảy ra.";
const isAdmin = () => S.user && S.user.email === ADMIN_EMAIL;

/* ── Tuỳ chọn đáp án: nghĩa đúng + 3 nghĩa mồi ─────────────────────── */
function makeOpts(item) {
  const pool = S.bank.filter(x => x.id !== item.id);
  shuffle(pool);
  const opts = [item.m, pool[0].m, pool[1].m, pool[2].m];
  shuffle(opts);
  return { opts, correct: opts.indexOf(item.m) };
}

/* ── Đồng bộ tiến độ học lên Firestore (điều kiện thi thật) ────────── */
async function syncItem(id, p) {
  if (!S.user || !p.firstOk) return;
  const ref = doc(db, "tango_userItems", S.user.uid, "items", id);
  const payload = { box:p.box, seen:p.seen, right:p.right, wrong:p.wrong, due:p.due, lastSeenAt: serverTimestamp() };
  try { await updateDoc(ref, payload); }
  catch (e) { // chưa có doc → tạo mới; rule bắt buộc learnedAt == request.time (chống lùi ngày)
    try { await setDoc(ref, { ...payload, learnedAt: serverTimestamp() }); }
    catch (e2) { console.warn("sync item:", e2); }
  }
}
function recordLearn(item, ok) {
  const p = prog[item.id] || { box:0, seen:0, right:0, wrong:0, due:0, firstOk:0 };
  p.seen++;
  if (ok) { p.right++; p.box = Math.min(p.box+1, 5); if (!p.firstOk) p.firstOk = Date.now(); }
  else    { p.wrong++; p.box = Math.max(1, p.box-2); }
  p.due = Date.now() + INTERVALS[p.box];
  prog[item.id] = p; saveProg();
  syncItem(item.id, p);
  return p;
}

/* ── Học ────────────────────────────────────────────────────────────── */
function vLearn() {
  const now = Date.now();
  const due = [], fresh = [];
  for (const it of S.bank) {
    const p = prog[it.id];
    if (!p) fresh.push(it); else if (p.due <= now) due.push(it);
  }
  shuffle(due); shuffle(fresh);
  const queue = due.concat(fresh).slice(0, 10);
  if (!queue.length) {
    $("#view").innerHTML = `<h1>Học</h1><div class="card center">
      <p>Hết mục đến hạn — não bạn đang được nghỉ đúng lịch. 🎋</p>
      <p class="note" style="margin-top:8px">Quay lại sau, hoặc vào thi thử để kiểm tra trí nhớ.</p></div>`;
    return;
  }
  let i = 0, right = 0;
  const step = () => {
    if (i >= queue.length) {
      $("#view").innerHTML = `<h1>Học</h1><div class="card center">
        <p class="big">${right}/${queue.length}</p><p class="note">câu đúng trong lượt này</p>
        <button class="btn" style="margin-top:14px" onclick="location.hash='';location.hash='learn'">Lượt mới</button></div>`;
      return;
    }
    const item = queue[i];
    const { opts, correct } = makeOpts(item);
    $("#view").innerHTML = `
      <p class="note">Học · ${i+1}/${queue.length}</p>
      <div class="card">
        <div class="word">${rubyWord(item)}</div>
        <p class="ask">Nghĩa tiếng Việt của từ này?</p>
        <div class="opts">${opts.map((o,k)=>`<button class="opt" data-k="${k}">${esc(o)}</button>`).join("")}</div>
        <div id="pack"></div>
      </div>`;
    document.querySelectorAll(".opt").forEach(b => b.addEventListener("click", () => {
      const k = +b.dataset.k, ok = k === correct;
      if (ok) right++;
      recordLearn(item, ok);
      document.querySelectorAll(".opt").forEach((x,xi) => {
        x.disabled = true;
        if (xi === correct) x.classList.add("right");
        else if (xi === k) x.classList.add("wrong");
      });
      speak(item);
      $("#pack").innerHTML = `<div class="pack">
        <b>${esc(item.w)}</b>（${esc(item.r)}）<button class="spk" data-spk="${esc(item.id)}" aria-label="phát âm">🔊</button>
        = <b style="color:var(--gold)">${esc(item.m)}</b>
        ${item.ex ? `<div class="ex jp">${item.ex} <button class="spk" data-spkex="${esc(item.id)}" aria-label="đọc câu ví dụ">🔊</button></div>` : ""}
        ${item.exvi ? `<div class="vi">${esc(item.exvi)}</div>` : ""}
        ${item.jp ? `<div class="jpdef">📖 ${esc(item.jp)}</div>` : ""}
        <button class="btn" style="margin-top:14px" id="nextBtn">Tiếp tục</button></div>`;
      $("#nextBtn").addEventListener("click", () => { i++; step(); });
      $("#nextBtn").focus();
    }));
  };
  step();
}

/* ── Bộ chạy bài thi dùng chung (thi thử + thi thật) ────────────────── */
function runTest(questions, opts) {
  const per = (opts.perSec || S.cfg?.perQuestionSec || 8) * 1000;
  const answers = new Array(questions.length).fill(-1);
  let i = 0, timer = null;
  S.testing = opts.routeName;
  const finish = () => { clearTimeout(timer); S.testing = false; opts.onDone(answers); };
  const step = () => {
    if (i >= questions.length) return finish();
    const q = questions[i];
    const golden = opts.goldenIdx === i;
    $("#view").innerHTML = `
      <p class="note">${esc(opts.title)} · câu ${i+1}/${questions.length}${opts.stake ? ` · 🎲 cược ${opts.stake} xu` : ""}</p>
      <div class="timer"><i id="tbar" style="width:100%"></i></div>
      <div class="card${golden ? " golden" : ""}">
        ${golden ? `<div class="gband">✨ CÂU HOÀNG KIM — trúng là +50% cược ✨</div>` : ""}
        <div class="word">${rubyWord(S.byId[q.itemId] || q)}</div>
        <p class="ask">Nghĩa tiếng Việt của từ này?</p>
        <div class="opts">${q.opts.map((o,k)=>`<button class="opt" data-k="${k}">${esc(o)}</button>`).join("")}</div>
      </div>`;
    const bar = $("#tbar");
    requestAnimationFrame(() => { bar.style.transition = `width ${per}ms linear`; bar.style.width = "0%"; });
    const next = k => { clearTimeout(timer); answers[i] = k; i++; step(); };
    timer = setTimeout(() => next(-1), per);
    document.querySelectorAll(".opt").forEach(b =>
      b.addEventListener("click", () => next(+b.dataset.k), { once:true }));
  };
  step();
}
// Câu sai kèm luôn gói ghi nhớ (ví dụ + dịch) — sai ở đâu, khắc sâu ở đó.
function reviewItemHtml(q, ans, correctIdx, golden) {
  const ok = ans === correctIdx;
  const it = S.byId[q.itemId];
  const chosen = ans >= 0 ? q.opts[ans] : "(bỏ trống)";
  return `<div class="it"><b class="jp">${esc(q.w)}</b>（${esc(q.r)}）
    <button class="spk" data-spk="${esc(q.itemId)}" aria-label="phát âm">🔊</button>
    ${golden ? "✨" : ""}<span class="${ok?"pos":"neg"}">${ok?"✓":"✗"}</span><br>
    <span class="note">${ok ? esc(q.opts[correctIdx])
      : esc(chosen) + " → đúng: " + esc(q.opts[correctIdx])}</span>
    ${!ok && it ? `${it.ex ? `<div class="ex jp" style="font-size:1rem;line-height:1.9">${it.ex}
        <button class="spk" data-spkex="${esc(it.id)}" aria-label="đọc câu ví dụ">🔊</button></div>` : ""}
      ${it.exvi ? `<div class="vi note">${esc(it.exvi)}</div>` : ""}` : ""}</div>`;
}
function reviewHtml(questions, answers, correct, goldenIdx) {
  return `<div class="review">` + questions.map((q,i) =>
    reviewItemHtml(q, answers[i], correct[i], goldenIdx === i)).join("") + `</div>`;
}

    <div class="card center">
      <p class="big cnt"><span id="rvScore">0</span>/${qs.length}</p>
      <p class="note">câu đúng · chuỗi <span class="flame">🔥 <span id="rvStreak">0</span></span> · dài nhất <span id="rvMax">0</span></p>
    </div>
    <div class="card"><div class="review" id="rvList"></div></div>
    <div id="rvPay"></div><div id="rvMeter"></div><div id="rvDbl"></div><div id="rvAct"></div>`;
  const list = $("#rvList");
  let right = 0, streak = 0, maxSt = 0;
  for (let i = 0; i < qs.length; i++) {
    if (!document.getElementById("rvList")) return; // user đã rời trang
    const ok = ans[i] === out.correct[i];
    const div = document.createElement("div");
    div.className = "pop";
    div.innerHTML = reviewItemHtml(qs[i], ans[i], out.correct[i], out.goldenIdx === i);
    list.appendChild(div);
    if (ok) { right++; streak++; maxSt = Math.max(maxSt, streak); sGood(); }
    else { streak = 0; sBad(); }
    $("#rvScore").textContent = right;
    $("#rvStreak").textContent = streak;
    $("#rvMax").textContent = maxSt;
    await sleep(out.late ? 60 : qs.length > 12 ? 170 : 260);
  }
  // Kết sổ bàn cược
  if (out.stake > 0 && document.getElementById("rvPay")) {
    const m = out.mult || { base:0, combo:0, golden:0, total:0 };
    const rows = [
      `Cược: <b>${out.stake} xu</b>`,
      out.late ? `<span class="neg">Nộp quá hạn — nhà cái nuốt cược.</span>`
        : `Chính xác ${out.right}/${qs.length} → hệ số <b>×${m.base}</b>${out.right === qs.length ? " 💎 JACKPOT" : ""}`,
      !out.late && m.combo ? `Chuỗi ${out.maxStreak} 🔥 → <b>+${Math.round(m.combo*100)}%</b>` : null,
      !out.late && out.goldenIdx >= 0 ? (out.goldenHit ? `Câu Hoàng Kim ✨ → <b>+50%</b>` : `Câu Hoàng Kim ✨ → trượt`) : null,
      out.capped ? `🔒 Kẹp trần thắng ngày (+${out.winCap} xu) — phần vượt bị cắt` : null,
    ].filter(Boolean);
    $("#rvPay").innerHTML = `<div class="card pop"><b>💰 Kết sổ bàn cược</b>
      <div style="margin:8px 0 4px;font-size:.92rem">${rows.map(r => `<div>${r}</div>`).join("")}</div>
      <p class="big cnt center" id="rvCoin">0 xu</p>
      <p class="note center" id="rvNet"></p></div>`;
    const target = out.payout || 0, el = $("#rvCoin");
    const stepN = Math.max(1, Math.ceil(target / 22));
    for (let v = 0; v < target;) {
      v = Math.min(target, v + stepN);
      if (!document.getElementById("rvCoin")) return;
      el.textContent = v + " xu"; sCoin(); await sleep(45);
    }
    const net = target - out.stake;
    if ($("#rvNet")) $("#rvNet").innerHTML =
      `trả thưởng — lãi/lỗ ván này: <b class="${net >= 0 ? "pos" : "neg"}">${net >= 0 ? "+" : ""}${net} xu</b>
       · hôm nay ròng ${out.gNet >= 0 ? "+" : ""}${out.gNet}/${out.winCap}`;
    if (target === 0) sLose(); else if (net > 0) sWin();
  }
  if (document.getElementById("rvMeter")) $("#rvMeter").innerHTML = `<div class="card pop">
    <div class="row"><b>Thang thưởng chu kỳ</b>
      <span class="${out.delta >= 0 ? "pos" : "neg"}"><b>${out.delta >= 0 ? "+" : ""}${out.delta} xu</b></span></div>
    <div class="meter"><i style="width:${out.cap ? Math.round(out.meter / out.cap * 100) : 0}%"></i></div>
    <p class="note">${out.meter}/${out.cap} xu · chỉ mục ra đề lần đầu trong chu kỳ mới nhích thang này</p></div>`;
  if (out.dbl) await offerDouble(res.testId, out.dbl);
  if (document.getElementById("rvAct")) $("#rvAct").innerHTML = `
    <button class="btn" onclick="location.hash='';location.hash='test'">🎰 Thi tiếp — không giới hạn</button>
    <button class="btn2" style="margin-top:8px" onclick="location.hash='wallet'">Xem Ví</button>`;
}

/* ── Kèo TẤT TAY: 1 từ khó nhất — nhân đôi tiền thắng hay về 0 ──────── */
function offerDouble(testId, dbl) {
  return new Promise(resolve => {
    const box = document.getElementById("rvDbl");
    if (!box) return resolve();
    const total = Math.max(5, (dbl.windowSec || 45) - 5) * 1000; // trừ hao mạng
    box.innerHTML = `<div class="card dbl pop">
      <div class="gband">🂠 TẤT TAY — NHÂN ĐÔI HAY VỀ KHÔNG 🂠</div>
      <p style="font-size:.92rem">Máy chủ rút <b>1 từ khó nhất của bạn</b> (hay sai nhất, ngoài đề vừa thi).
        Đúng: <b class="pos">+${dbl.amount} xu</b> nữa · Sai: <b class="neg">mất sạch ${dbl.amount} xu vừa thắng</b>.</p>
      <div class="timer" style="margin:10px 0"><i id="dblT" style="width:100%"></i></div>
      <div class="grid2">
        <button class="btnRed" id="dblGo">🔥 TẤT TAY</button>
        <button class="btn2" id="dblNo">Rút lui giữ xu</button>
      </div><div id="dblQ"></div></div>`;
    const bar = $("#dblT");
    requestAnimationFrame(() => { bar.style.transition = `width ${total}ms linear`; bar.style.width = "0%"; });
    let done = false;
    const finish = html => { if (done) return; done = true;
      if (html != null && document.getElementById("rvDbl")) box.innerHTML = html; resolve(); };
    const expireT = setTimeout(() =>
      finish(`<div class="card"><p class="note">⌛ Hết giờ quyết định — bạn giữ chắc ${dbl.amount} xu. Khôn đấy.</p></div>`), total);
    $("#dblNo").addEventListener("click", () => { clearTimeout(expireT);
      finish(`<div class="card"><p class="note">Bạn rút lui — ${dbl.amount} xu về ví an toàn.</p></div>`); });
    $("#dblGo").addEventListener("click", () => {
      $("#dblGo").disabled = true; $("#dblNo").disabled = true;
      const q = dbl.q, it = S.byId[q.itemId];
      $("#dblQ").innerHTML = `
        <div class="word" style="margin-top:12px">${rubyWord(it || q)}</div>
        <p class="ask">Nghĩa tiếng Việt? Cả ${dbl.amount} xu nằm trên câu này.</p>
        <div class="opts">${q.opts.map((o,k) => `<button class="opt" data-k="${k}">${esc(o)}</button>`).join("")}</div>`;
      document.querySelectorAll("#dblQ .opt").forEach(b => b.addEventListener("click", async () => {
        if (done) return;
        clearTimeout(expireT);
        document.querySelectorAll("#dblQ .opt").forEach(x => x.disabled = true);
        try {
          const r = await call("resolveDouble", { testId, answer: +b.dataset.k });
          if (it && !r.expired) recordLearn(it, !!r.win);
          if (r.expired)
            return finish(`<div class="card"><p class="err">⌛ Quá giờ — kèo hết hạn, tiền thắng vẫn giữ nguyên.</p></div>`);
          if (r.win) { sWin();
            finish(`<div class="card dbl center pop"><p class="big pos">＋${r.delta} xu 🎉</p>
              <p class="note">TẤT TAY THẮNG — nhân đôi thành công${r.capped ? " (bị cắt bớt vì trần ngày)" : ""}.</p></div>`);
          } else { sLose();
            finish(`<div class="card center pop"><p class="big neg">−${-r.delta} xu 💀</p>
              <p class="note">Về không. Đáp án đúng: <b>${esc(q.opts[r.correctIdx] ?? "?")}</b> — lần này thì nhớ nhé.</p></div>`);
          }
        } catch (e) { finish(`<div class="card"><p class="err">${esc(errMsg(e))}</p></div>`); }
      }, { once: true }));
    });
  });
}

  const steps = [
    { t: "Học từ", done: st.learned > 0,

        : `bấm "Đăng nhập" góc phải trên — chỉ tiến độ học KHI đã đăng nhập mới được tính vào điều kiện thi thật` },

    { t: "Mở chu kỳ thưởng", done: !!cyc && !expired,
      n: cyc ? (expired
          ? `chu kỳ ĐÃ HẾT HẠN — vào Ví bấm "Chốt chu kỳ" nhận ${cyc.rewardMeter || 0} xu, rồi mở chu kỳ mới`

        : `mở khóa khi có chu kỳ đang chạy` },

      <p class="note" style="margin-top:8px">Số mục đã học/chín là ước tính lưu trên máy này; xu và chu kỳ đọc thẳng từ máy chủ.</p>

      <div class="note" style="margin-top:6px">Máy tự xếp lịch ôn cách quãng: trả lời đúng → hẹn gặp lại xa dần

/* ── Sổ đăng ký user: ghi hồ sơ mỗi lần đăng nhập ─────────────────── */
async function recordUser(u) {
  try {
    const ref = doc(db, "tango_users", u.uid);
    let learned = 0;
    for (const it of S.bank) if (prog[it.id]?.firstOk) learned++;
    const base = { email: u.email || null, name: u.displayName || null,
                   photo: u.photoURL || null, learnedCount: learned,
                   lastSeenAt: serverTimestamp() };
    const snap = await getDoc(ref);
    if (snap.exists()) await setDoc(ref, base, { merge: true });
    else await setDoc(ref, { ...base, createdAt: serverTimestamp() });
  } catch (e) { console.warn("recordUser:", e); }
}

/* ── Tin nhắn: user ↔ admin, mỗi user một luồng /tango_threads/{uid} ── */
async function sendMessage(uid, from, text, meta) {
  text = String(text || "").trim();
  if (!text) return;
  const tref = doc(db, "tango_threads", uid);
  await addDoc(collection(tref, "messages"), { from, text, createdAt: serverTimestamp() });
  const upd = { uid, lastText: text.slice(0, 120), lastAt: serverTimestamp(), lastFrom: from, ...(meta || {}) };
  upd[from === "user" ? "adminUnread" : "userUnread"] = increment(1);
  await setDoc(tref, upd, { merge: true });
}
async function markRead(uid, who) {
  try { await setDoc(doc(db, "tango_threads", uid),
    { [who === "admin" ? "adminUnread" : "userUnread"]: 0 }, { merge: true }); } catch (e) {}
}
function renderBubbles(box, msgs, viewer) {
  if (!box) return;
  if (!msgs.length) { box.innerHTML = `<p class="note center" style="padding:16px 0">Chưa có tin nhắn nào — hãy bắt đầu.</p>`; return; }
  box.innerHTML = msgs.map(m => {
    const mine = m.from === viewer;
    const label = mine ? "" : (m.from === "admin" ? "👑 Admin" : "Người dùng");
    return `<div class="bubble ${mine ? "me" : "them"}"><div class="btext">${esc(m.text)}</div><div class="bmeta">${label ? esc(label) + " · " : ""}${m.createdAt ? fmtTime(m.createdAt) : "đang gửi…"}</div></div>`;
  }).join("");
  box.scrollTop = box.scrollHeight;
}

/* Điểm vào: admin thấy hộp thư; user thường thấy khung chat với admin */
function vChat() {
  if (!S.user) {
    $("#view").innerHTML = `<h1>Tin nhắn</h1>
      <div class="card center"><p>Đăng nhập để nhắn tin cho admin.</p>
      <button class="btn" style="margin-top:12px" id="loginBtn">Đăng nhập bằng Google</button></div>`;
    $("#loginBtn").addEventListener("click", login); return;
  }
  return isAdmin() ? vChatAdmin() : vChatUser();
}

/* User thường: khung chat riêng với admin */
function vChatUser() {
  const uid = S.user.uid;
  $("#view").innerHTML = `
    <h1>Tin nhắn</h1>
    <p class="sub">Nhắn riêng cho admin — góp ý, hỏi về xu, xin cấp xu, báo lỗi… Chỉ bạn và admin đọc được.</p>
    <div class="card">
      <div id="chatInvite"></div>
      <div id="chatBox" class="chatbox"><p class="note">Đang tải…</p></div>
      <div class="chatform">
        <input id="chatIn" placeholder="Có lời muốn nói admin?" maxlength="2000" autocomplete="off">
        <button class="mini btn" id="chatSend">Gửi</button>
      </div>
      <div id="chatErr"></div>
    </div>`;
  const msgsQ = query(collection(doc(db, "tango_threads", uid), "messages"), orderBy("createdAt", "asc"), limit(300));
  S.chatUnsub = onSnapshot(msgsQ, snap => {
    const msgs = snap.docs.map(d => d.data());
    renderBubbles($("#chatBox"), msgs, "user");
    const inv = $("#chatInvite");
    if (inv) inv.innerHTML = msgs.length ? "" : `<p class="chatprompt">💬 Có lời muốn nói admin?</p>`;
    if (msgs.length) markRead(uid, "user");
  }, err => { const b = $("#chatBox"); if (b) b.innerHTML = `<p class="err">${esc(errMsg(err))}</p>`; });
  const send = async () => {
    const inp = $("#chatIn"), t = inp.value.trim(); if (!t) return;
    inp.value = ""; inp.focus();
    try { await sendMessage(uid, "user", t,
      { email: S.user.email || null, name: S.user.displayName || null, photo: S.user.photoURL || null }); }
    catch (e) { $("#chatErr").innerHTML = `<p class="err">${esc(errMsg(e))}</p>`; }
  };
  $("#chatSend").addEventListener("click", send);
  $("#chatIn").addEventListener("keydown", e => { if (e.key === "Enter") send(); });
}

/* Admin: hộp thư 2 khung (trái = danh sách user, phải = hội thoại).
 * Chọn qua lại giữa các user tức thì, không rời trang. ?u=UID để mở sẵn 1 người. */
function vChatAdmin() {
  let listUnsub = null, msgUnsub = null, threads = [], filter = "";
  let selUid = new URLSearchParams((location.hash.split("?")[1] || "")).get("u");
  S.chatUnsub = () => { if (listUnsub) listUnsub(); if (msgUnsub) msgUnsub(); listUnsub = msgUnsub = null; };

  $("#view").innerHTML = `
    <div class="row" style="margin-bottom:10px"><h1 style="margin:0">Hộp thư <span id="acUnread"></span></h1></div>
    <div class="adminchat" id="ac">
      <aside class="threadlist">
        <div class="tl-search"><input id="tlSearch" placeholder="🔍 Tìm tên hoặc email…" autocomplete="off"></div>
        <div class="tl-items" id="tlItems"><p class="note" style="padding:12px">Đang tải…</p></div>
      </aside>
      <section class="threadview" id="tv"><div class="tv-empty">← Chọn một người để xem và trả lời.</div></section>
    </div>`;
  $("#tlSearch").addEventListener("input", e => { filter = e.target.value.trim().toLowerCase(); renderList(); });

  listUnsub = onSnapshot(
    query(collection(db, "tango_threads"), orderBy("lastAt", "desc"), limit(300)),
    snap => { threads = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderList();
      if (selUid && !msgUnsub) openThread(selUid); },
    err => { const b = $("#tlItems"); if (b) b.innerHTML = `<p class="err" style="padding:12px">${esc(errMsg(err))}</p>`; });

  function renderList() {
    const box = $("#tlItems"); if (!box) return;
    const uEl = $("#acUnread");
    const totalUnread = threads.reduce((a, t) => a + (t.adminUnread || 0), 0);
    if (uEl) uEl.innerHTML = totalUnread ? `<span class="tag">${totalUnread} mới</span>` : "";
    const items = filter
      ? threads.filter(t => `${t.name || ""} ${t.email || ""}`.toLowerCase().includes(filter))
      : threads;
    if (!items.length) {
      box.innerHTML = `<p class="note" style="padding:12px">${threads.length ? "Không khớp." : "Chưa có ai nhắn tin."}</p>`;
      return;
    }
    box.innerHTML = items.map(t => {
      const un = t.adminUnread || 0;
      return `<div class="tl-item ${t.id === selUid ? "active" : ""}" data-uid="${esc(t.id)}">
        ${t.photo ? `<img class="tl-av" src="${esc(t.photo)}" alt="" referrerpolicy="no-referrer">`
                  : `<span class="tl-av tl-av0">${esc(String(t.name || t.email || "?").trim()[0] || "?")}</span>`}
        <div class="tl-main">
          <div class="tl-top"><b class="${un ? "tl-unreadname" : ""}">${esc(t.name || t.email || t.id)}</b>
            ${t.lastAt ? `<span class="tl-time">${fmtTime(t.lastAt)}</span>` : ""}</div>
          <div class="tl-prev">${t.lastFrom === "admin" ? "Bạn: " : ""}${esc(t.lastText || "")}</div>
        </div>
        ${un ? `<span class="tl-badge">${un > 9 ? "9+" : un}</span>` : ""}
      </div>`;
    }).join("");
    box.querySelectorAll(".tl-item").forEach(el => el.addEventListener("click", () => openThread(el.dataset.uid)));
  }

  function openThread(uid) {
    selUid = uid;
    if (msgUnsub) { msgUnsub(); msgUnsub = null; }
    history.replaceState(null, "", "#chat?u=" + uid);
    $("#ac")?.classList.add("viewing");
    renderList();
    const t = threads.find(x => x.id === uid) || {};
    const tv = $("#tv"); if (!tv) return;
    tv.innerHTML = `
      <div class="tv-head">
        <button class="tv-back btn2" id="tvBack" aria-label="Quay lại">←</button>
        ${t.photo ? `<img class="tl-av" src="${esc(t.photo)}" alt="" referrerpolicy="no-referrer">`
                  : `<span class="tl-av tl-av0">${esc(String(t.name || t.email || "?").trim()[0] || "?")}</span>`}
        <div class="tl-main"><b>${esc(t.name || t.email || uid)}</b><div class="note">${esc(t.email || "")}</div></div>
      </div>
      <div class="chatbox tv-body" id="chatBox"><p class="note" style="padding:12px">Đang tải…</p></div>
      <div class="chatform">
        <input id="chatIn" placeholder="Trả lời${t.name ? " " + esc(t.name) : ""}…" maxlength="2000" autocomplete="off">
        <button class="mini btn" id="chatSend">Gửi</button>
      </div>
      <div id="chatErr" style="padding:0 12px"></div>`;
    $("#tvBack")?.addEventListener("click", () => {
      selUid = null; if (msgUnsub) { msgUnsub(); msgUnsub = null; }
      history.replaceState(null, "", "#chat");
      $("#ac")?.classList.remove("viewing"); renderList();
      const el = $("#tv"); if (el) el.innerHTML = `<div class="tv-empty">← Chọn một người để xem và trả lời.</div>`;
    });
    const msgsQ = query(collection(doc(db, "tango_threads", uid), "messages"), orderBy("createdAt", "asc"), limit(500));
    msgUnsub = onSnapshot(msgsQ, snap => {
      renderBubbles($("#chatBox"), snap.docs.map(d => d.data()), "admin"); markRead(uid, "admin");
    }, err => { const b = $("#chatBox"); if (b) b.innerHTML = `<p class="err">${esc(errMsg(err))}</p>`; });
    const send = async () => {
      const inp = $("#chatIn"), v = inp.value.trim(); if (!v) return;
      inp.value = ""; inp.focus();
      try { await sendMessage(uid, "admin", v,
        { email: t.email || null, name: t.name || null, photo: t.photo || null }); }
      catch (e) { $("#chatErr").innerHTML = `<p class="err">${esc(errMsg(e))}</p>`; }
    };
    $("#chatSend").addEventListener("click", send);
    $("#chatIn").addEventListener("keydown", e => { if (e.key === "Enter") send(); });
    if (window.innerWidth > 640) $("#chatIn").focus();
  }
}

/* Chấm đỏ số tin chưa đọc trên tab "Tin nhắn" */
let unreadUnsub = null;
function watchUnread() {
  if (unreadUnsub) { unreadUnsub(); unreadUnsub = null; }
  const nav = document.querySelector('#nav a[data-r="chat"]');
  const setBadge = n => { if (nav) nav.innerHTML = `Tin nhắn${n ? ` <span class="ndot">${n > 9 ? "9+" : n}</span>` : ""}`; };
  setBadge(0);
  if (!S.user) return;
  if (isAdmin()) {
    unreadUnsub = onSnapshot(query(collection(db, "tango_threads"), where("adminUnread", ">", 0)),
      s => { let n = 0; s.forEach(d => n += d.data().adminUnread || 0); setBadge(n); }, () => {});
  } else {
    unreadUnsub = onSnapshot(doc(db, "tango_threads", S.user.uid),
      s => setBadge(s.exists() ? (s.data().userUnread || 0) : 0), () => {});
  }
}

/* ── Auth ───────────────────────────────────────────────────────────── */
async function login() {
  const prov = new GoogleAuthProvider();
  try { await signInWithPopup(auth, prov); }
  catch (e) {
    if (e.code === "auth/popup-blocked" || e.code === "auth/operation-not-supported-in-this-environment")
      await signInWithRedirect(auth, prov);
    else alert(errMsg(e));
  }
}
getRedirectResult(auth).catch(() => {});
onAuthStateChanged(auth, u => {
  S.user = u;
  const chip = $("#uchip");
  if (u) {
    chip.textContent = u.displayName || u.email;
    chip.title = "Bấm để đăng xuất";
    chip.onclick = () => { if (confirm("Đăng xuất?")) signOut(auth); };
    recordUser(u);
  } else {
    chip.textContent = "Đăng nhập"; chip.title = "";
    chip.onclick = login;
  }
  watchUnread();
  route();
});

/* ── Khởi động ──────────────────────────────────────────────────────── */
(async () => {
  try {
    const res = await fetch("data/bank.json");
    const bank = await res.json();
    S.bank = bank.items; S.bank.forEach(it => S.byId[it.id] = it);
  } catch (e) {
    $("#view").innerHTML = `<p class="err">Không tải được ngân hàng từ vựng (data/bank.json).</p>`;
    return;
  }
  try {
    const s = await getDoc(doc(db, "tango_config", "app"));
    S.cfg = { ...CFG_DEFAULT, ...(s.exists() ? s.data() : {}) };
  } catch (e) { S.cfg = { ...CFG_DEFAULT }; }
  route();
})();
</script>
